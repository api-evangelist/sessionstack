apis:
  - aid: sessionstack:sessionstack-api
    name: SessionStack REST API
    description: >
      The SessionStack REST API provides programmatic access to session
      recordings, user events, errors, and logs. Developers can retrieve and
      search sessions associated with their websites, get details about
      individual sessions, delete sessions, export session data, and add
      log entries to sessions. The Scale plan and above unlock data export via
      REST API.
